<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黄的投票站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFD700',
                        secondary: '#FF9800',
                        danger: '#FF4444',
                        dark: '#1A1A1A',
                        light: '#F5F5F5'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .btn-primary {
                @apply bg-primary text-black px-4 py-2 rounded-lg font-semibold hover:bg-yellow-400 transition-all shadow-md;
            }
            .btn-secondary {
                @apply bg-secondary text-white px-4 py-2 rounded-lg font-semibold hover:bg-orange-500 transition-all shadow-md;
            }
            .btn-danger {
                @apply bg-danger text-white px-4 py-2 rounded-lg font-semibold hover:bg-red-500 transition-all shadow-md;
            }
            .input-field {
                @apply w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary;
            }
            .card {
                @apply bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 transition-all hover:shadow-xl;
            }
            .badge {
                @apply px-2 py-1 rounded-full text-xs font-bold;
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
    <div id="app" class="flex flex-col min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-2">
                        <i class="fa fa-bar-chart text-primary text-2xl"></i>
                        <h1 class="text-xl font-bold">小黄的投票站</h1>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                            <i class="fa fa-moon-o dark:hidden"></i>
                            <i class="fa fa-sun-o hidden dark:inline"></i>
                        </button>
                        
                        <div id="userInfo" class="hidden items-center space-x-3">
                            <span id="welcomeText" class="hidden md:inline"></span>
                            <button id="adminBtn" class="hidden btn-secondary px-3 py-1 text-sm">管理后台</button>
                            <button id="logoutBtn" class="btn-danger px-3 py-1 text-sm">退出</button>
                        </div>
                        
                        <div id="authButtons" class="flex items-center space-x-2">
                            <button id="loginBtn" class="btn-primary px-3 py-1 text-sm">登录</button>
                            <button id="registerBtn" class="btn-secondary px-3 py-1 text-sm">注册</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 在线用户 -->
        <div class="bg-white dark:bg-gray-800 shadow-sm py-2">
            <div class="container mx-auto px-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <i class="fa fa-users text-primary"></i>
                        <span>在线用户: <span id="onlineCount">0</span></span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span id="onlineUsersList" class="text-sm text-gray-600 dark:text-gray-400"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主要内容 -->
        <main class="flex-grow container mx-auto px-4 py-6">
            <!-- 首页 -->
            <div id="homeView" class="view block">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">最新投票</h2>
                    <button id="createVoteBtn" class="btn-primary">
                        <i class="fa fa-plus mr-2"></i>发起投票
                    </button>
                </div>
                
                <div id="votesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-10">
                        <i class="fa fa-bar-chart text-4xl text-gray-400 mb-4"></i>
                        <p class="text-gray-500">暂无投票，点击上方发起第一个投票</p>
                    </div>
                </div>
            </div>

            <!-- 创建投票 -->
            <div id="createVoteView" class="view hidden">
                <div class="max-w-2xl mx-auto card">
                    <h2 class="text-2xl font-bold mb-6">发起投票</h2>
                    <form id="createVoteForm">
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">标题</label>
                            <input type="text" id="voteTitle" class="input-field" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">描述</label>
                            <textarea id="voteDesc" class="input-field h-24"></textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">选项</label>
                            <div id="voteOptions">
                                <div class="flex gap-2 mb-2">
                                    <input type="text" class="input-field option-input" placeholder="选项 1" required>
                                    <button type="button" class="btn-secondary add-option">+</button>
                                </div>
                                <div class="flex gap-2 mb-2">
                                    <input type="text" class="input-field option-input" placeholder="选项 2" required>
                                    <button type="button" class="btn-danger remove-option">-</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">类型</label>
                            <div class="flex gap-4">
                                <label class="flex items-center">
                                    <input type="radio" name="voteType" value="single" checked class="mr-2">
                                    <span>单选</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="radio" name="voteType" value="multiple" class="mr-2">
                                    <span>多选</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">截止时间</label>
                            <input type="datetime-local" id="voteDeadline" class="input-field">
                        </div>
                        
                        <div class="flex gap-4 justify-end">
                            <button type="button" id="cancelCreateBtn" class="btn-secondary">取消</button>
                            <button type="submit" class="btn-primary">发布投票</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 投票详情 -->
            <div id="voteDetailView" class="view hidden">
                <div class="max-w-2xl mx-auto card">
                    <div class="flex justify-between items-center mb-4">
                        <h2 id="detailTitle" class="text-2xl font-bold"></h2>
                        <button id="closeDetailBtn" class="btn-danger px-3 py-1">关闭</button>
                    </div>
                    <div id="voteDetailContent"></div>
                </div>
            </div>

            <!-- 登录 -->
            <div id="loginView" class="view hidden">
                <div class="max-w-md mx-auto card">
                    <h2 class="text-2xl font-bold mb-6 text-center">登录</h2>
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">用户名</label>
                            <input type="text" id="loginUsername" class="input-field" required>
                        </div>
                        <div class="mb-6">
                            <label class="block mb-2 font-semibold">密码</label>
                            <input type="password" id="loginPassword" class="input-field" required>
                        </div>
                        <button type="submit" class="btn-primary w-full mb-4">登录</button>
                        <p class="text-center text-sm text-gray-600 dark:text-gray-400">
                            没有账号？<button type="button" id="goToRegisterBtn" class="text-primary">注册</button>
                        </p>
                    </form>
                </div>
            </div>

            <!-- 注册 -->
            <div id="registerView" class="view hidden">
                <div class="max-w-md mx-auto card">
                    <h2 class="text-2xl font-bold mb-6 text-center">注册</h2>
                    <form id="registerForm">
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">用户名</label>
                            <input type="text" id="registerUsername" class="input-field" required>
                        </div>
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">真实姓名</label>
                            <input type="text" id="registerRealName" class="input-field" required>
                        </div>
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">密码</label>
                            <input type="password" id="registerPassword" class="input-field" required>
                        </div>
                        <div class="mb-4">
                            <label class="block mb-2 font-semibold">身份</label>
                            <select id="registerRole" class="input-field">
                                <option value="user">普通用户</option>
                                <option value="vip">VIP用户</option>
                                <option value="admin">管理员</option>
                            </select>
                        </div>
                        <div id="adminCodeGroup" class="mb-4 hidden">
                            <label class="block mb-2 font-semibold">管理员密码</label>
                            <input type="password" id="adminCode" class="input-field">
                        </div>
                        <div id="vipCodeGroup" class="mb-4 hidden">
                            <label class="block mb-2 font-semibold">VIP邀请码</label>
                            <input type="text" id="vipCode" class="input-field">
                        </div>
                        <button type="submit" class="btn-primary w-full mb-4">注册</button>
                        <p class="text-center text-sm text-gray-600 dark:text-gray-400">
                            已有账号？<button type="button" id="goToLoginBtn" class="text-primary">登录</button>
                        </p>
                    </form>
                </div>
            </div>

            <!-- 管理后台 -->
            <div id="adminView" class="view hidden">
                <div class="card">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">管理后台</h2>
                        <button id="closeAdminBtn" class="btn-danger">关闭</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <h3 class="text-xl font-semibold mb-4">用户管理</h3>
                            <div id="adminUsersList" class="space-y-2 max-h-96 overflow-y-auto"></div>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold mb-4">投票管理</h3>
                            <div id="adminVotesList" class="space-y-2 max-h-96 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部 -->
        <footer class="bg-white dark:bg-gray-800 shadow-md py-4 mt-6">
            <div class="container mx-auto px-4 text-center text-sm text-gray-600 dark:text-gray-400">
                <p>© 2025 小黄的投票站 | 安全、简单、高效</p>
            </div>
        </footer>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 transform transition-transform duration-300 translate-x-full"></div>

    <script>
        // 全局变量
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('users')) || [
            { id: 'u1', username: 'admin', realName: '管理员', pwd: 'admin', role: 'admin', isAdmin: true }
        ];
        let votes = JSON.parse(localStorage.getItem('votes')) || [];
        let comments = JSON.parse(localStorage.getItem('comments')) || [];
        let onlineUsers = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            initEventListeners();
            initOnlineStatus();
            updateUI();
            renderVotes();
        });

        // 主题切换
        function initTheme() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) document.documentElement.classList.add('dark');
        }

        // 事件监听
        function initEventListeners() {
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('loginBtn').addEventListener('click', () => showView('loginView'));
            document.getElementById('registerBtn').addEventListener('click', () => showView('registerView'));
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('createVoteBtn').addEventListener('click', () => showView('createVoteView'));
            document.getElementById('cancelCreateBtn').addEventListener('click', () => showView('homeView'));
            document.getElementById('closeDetailBtn').addEventListener('click', () => showView('homeView'));
            document.getElementById('closeAdminBtn').addEventListener('click', () => showView('homeView'));
            document.getElementById('goToRegisterBtn').addEventListener('click', () => showView('registerView'));
            document.getElementById('goToLoginBtn').addEventListener('click', () => showView('loginView'));
            document.getElementById('adminBtn').addEventListener('click', () => showView('adminView'));

            // 表单
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
            document.getElementById('createVoteForm').addEventListener('submit', handleCreateVote);

            // 角色选择
            document.getElementById('registerRole').addEventListener('change', function() {
                document.getElementById('adminCodeGroup').classList.add('hidden');
                document.getElementById('vipCodeGroup').classList.add('hidden');
                if (this.value === 'admin') document.getElementById('adminCodeGroup').classList.remove('hidden');
                if (this.value === 'vip') document.getElementById('vipCodeGroup').classList.remove('hidden');
            });

            // 添加选项
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('add-option')) addOption();
                if (e.target.classList.contains('remove-option')) removeOption(e.target);
            });
        }

        // 切换主题
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
        }

        // 显示视图
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        }

        // 登录
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.pwd === password);
            if (!user) return showToast('用户名或密码错误', 'danger');
            
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            updateUI();
            showView('homeView');
            showToast('登录成功', 'primary');
        }

        // 注册
        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const realName = document.getElementById('registerRealName').value;
            const password = document.getElementById('registerPassword').value;
            const role = document.getElementById('registerRole').value;
            const adminCode = document.getElementById('adminCode').value;
            const vipCode = document.getElementById('vipCode').value;

            if (users.some(u => u.username === username)) return showToast('用户名已存在', 'danger');
            if (role === 'admin' && adminCode !== '525212') return showToast('管理员密码错误', 'danger');
            if (role === 'vip' && vipCode !== '057712') return showToast('VIP邀请码错误', 'danger');

            const newUser = {
                id: 'u' + Date.now(),
                username,
                realName,
                pwd: password,
                role: role === 'admin' ? 'admin' : role === 'vip' ? 'vip' : 'user',
                isAdmin: role === 'admin'
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            showToast('注册成功，请登录', 'primary');
            showView('loginView');
        }

        // 退出登录
        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateUI();
            showView('homeView');
            showToast('已退出登录', 'secondary');
        }

        // 创建投票
        function handleCreateVote(e) {
            e.preventDefault();
            if (!currentUser) return showToast('请先登录', 'danger');

            const title = document.getElementById('voteTitle').value;
            const desc = document.getElementById('voteDesc').value;
            const type = document.querySelector('input[name="voteType"]:checked').value;
            const deadline = document.getElementById('voteDeadline').value;
            
            const options = Array.from(document.querySelectorAll('.option-input'))
                .filter(input => input.value.trim())
                .map(input => ({ text: input.value.trim(), img: '', votes: 0 }));

            if (options.length < 2) return showToast('至少需要2个选项', 'danger');

            const newVote = {
                id: 'v' + Date.now(),
                title,
                desc,
                isMultiple: type === 'multiple',
                deadline,
                creatorId: currentUser.id,
                creatorName: currentUser.realName,
                options,
                voters: []
            };

            votes.unshift(newVote);
            localStorage.setItem('votes', JSON.stringify(votes));
            document.getElementById('createVoteForm').reset();
            renderVotes();
            showView('homeView');
            showToast('投票发布成功', 'primary');
        }

        // 渲染投票列表
        function renderVotes() {
            const container = document.getElementById('votesList');
            if (votes.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-10">
                        <i class="fa fa-bar-chart text-4xl text-gray-400 mb-4"></i>
                        <p class="text-gray-500">暂无投票，点击上方发起第一个投票</p>
                    </div>`;
                return;
            }

            container.innerHTML = votes.map(vote => `
                <div class="card">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold">${vote.title}</h3>
                        <span class="badge ${vote.isMultiple ? 'bg-purple-500' : 'bg-blue-500'} text-white">
                            ${vote.isMultiple ? '多选' : '单选'}
                        </span>
                    </div>
                    <p class="text-gray-600 dark:text-gray-400 mb-4 line-clamp-3">${vote.desc || '无描述'}</p>
                    <div class="flex justify-between items-center text-sm text-gray-500 mb-4">
                        <span><i class="fa fa-user mr-1"></i>${vote.creatorName}</span>
                        <span><i class="fa fa-clock-o mr-1"></i>${vote.deadline ? new Date(vote.deadline).toLocaleString() : '永久'}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="viewVoteDetail('${vote.id}')" class="btn-primary flex-1 text-center">查看详情</button>
                        ${currentUser && (currentUser.isAdmin || currentUser.id === vote.creatorId) ? 
                            `<button onclick="deleteVote('${vote.id}')" class="btn-danger flex-1">删除</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 查看投票详情
        function viewVoteDetail(voteId) {
            const vote = votes.find(v => v.id === voteId);
            if (!vote) return;
            
            const container = document.getElementById('voteDetailContent');
            const isVoted = currentUser && vote.voters.some(v => v.id === currentUser.id);
            
            container.innerHTML = `
                <p class="text-gray-600 dark:text-gray-400 mb-6">${vote.desc || '无描述'}</p>
                <div class="space-y-4 mb-6">
                    ${vote.options.map((opt, idx) => `
                        <div class="p-3 border rounded-lg ${isVoted ? 'opacity-80' : ''}">
                            <label class="flex items-center justify-between">
                                <span>${opt.text}</span>
                                <span class="text-sm font-bold">${opt.votes} 票</span>
                            </label>
                        </div>
                    `).join('')}
                </div>
                <div class="text-sm text-gray-500 mb-4">
                    <p>创建者: ${vote.creatorName}</p>
                    <p>截止时间: ${vote.deadline ? new Date(vote.deadline).toLocaleString() : '永久有效'}</p>
                </div>
            `;

            showView('voteDetailView');
        }

        // 删除投票
        function deleteVote(voteId) {
            if (!confirm('确定删除？')) return;
            votes = votes.filter(v => v.id !== voteId);
            localStorage.setItem('votes', JSON.stringify(votes));
            renderVotes();
            showToast('删除成功', 'danger');
        }

        // 更新UI
        function updateUI() {
            currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
            
            if (currentUser) {
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('authButtons').classList.add('hidden');
                document.getElementById('welcomeText').textContent = `你好, ${currentUser.realName}`;
                document.getElementById('adminBtn').classList.toggle('hidden', !currentUser.isAdmin);
            } else {
                document.getElementById('userInfo').classList.add('hidden');
                document.getElementById('authButtons').classList.remove('hidden');
            }
        }

        // 在线状态
        function initOnlineStatus() {
            setInterval(() => {
                if (currentUser) {
                    onlineUsers = onlineUsers.filter(u => Date.now() - u.time < 30000);
                    if (!onlineUsers.some(u => u.id === currentUser.id)) {
                        onlineUsers.push({
                            id: currentUser.id,
                            姓名: 当前用户.真实姓名,
                            角色: 当前用户.角色,
                            时间: 日期.现在()
                        });
                    }
                }
                document.getElementById('onlineCount').textContent = onlineUsers.length;
            }, 5000);
        }

        // 提示框
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = 'fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 transform transition-transform duration-300 translate-x-0';
            toast.classList.add(type === 'primary' ? 'bg-primary' : type === 'danger' ? 'bg-danger' : 'bg-secondary');
            toast.textContent = message;
            setTimeout(() => toast.classList.add('translate-x-full'), 2000);
        }

        // 添加选项
        function addOption() {
            const container = document.getElementById('voteOptions');
            const div = document.createElement('div');
            div.className = 'flex gap-2 mb-2';
            div.innerHTML = `
                <input type="text" class="input-field option-input" placeholder="选项 ${container.children.length + 1}" required>
                <button type="button" class="btn-danger remove-option">-</button>
            `;
            容器.appendChild(div);
        }

        // 删除选项
        函数 removeOption(按钮) {
            const container = document.getElementById('voteOptions');
            如果 (容器.子节点.长度 > 2) 按钮.父元素.移除();
        }
    </script>
</body>
</html>
